<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incrementalism - Standalone</title>
    
    <!-- TAILWIND PLAY CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    
    <!-- REACT & BABEL CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      :root { color-scheme: dark; background-color: #090a0f; }
      body { margin: 0; background-color: #090a0f; overflow: hidden; }
      @keyframes glow-pulse {
        0% { box-shadow: 0 0 5px rgba(125,211,252,0.2); }
        50% { box-shadow: 0 0 20px rgba(125,211,252,0.5); }
        100% { box-shadow: 0 0 5px rgba(125,211,252,0.2); }
      }
      .hex-node { transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
      .hex-node:hover { filter: drop-shadow(0 0 8px #7dd3fc); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef, useMemo } = React;

      // ==========================================
      // CONSTANTS & UTILS
      // ==========================================
      const NODE_TYPES = {
        EMPTY: 'EMPTY', CORE: 'CORE', PRODUCTIVE: 'PRODUCTIVE', OFFENSIVE: 'OFFENSIVE',
        ADVANCE: 'ADVANCE', DEFENSIVE: 'DEFENSIVE', BORDER: 'BORDER', REPAIR: 'REPAIR',
        ENEMY_CORE: 'ENEMY_CORE', ENEMY_NODE: 'ENEMY_NODE'
      };

      const INITIAL_HP = {
        [NODE_TYPES.CORE]: 100, [NODE_TYPES.BORDER]: 10, [NODE_TYPES.PRODUCTIVE]: 50,
        [NODE_TYPES.OFFENSIVE]: 75, [NODE_TYPES.ADVANCE]: 60, [NODE_TYPES.DEFENSIVE]: 200,
        [NODE_TYPES.REPAIR]: 120, [NODE_TYPES.ENEMY_CORE]: 500, [NODE_TYPES.ENEMY_NODE]: 150
      };

      const BITS_COST = {
        [NODE_TYPES.PRODUCTIVE]: 10, [NODE_TYPES.OFFENSIVE]: 50, [NODE_TYPES.DEFENSIVE]: 75,
        [NODE_TYPES.ADVANCE]: 100, [NODE_TYPES.REPAIR]: 150
      };

      const STAT_COST_BASE = 100;
      const MAJOR_COST = 500;
      const MAX_STAT_LEVEL = 10;
      const HEX_SIZE = 40;

      const hexKey = (q, r) => `${q},${r}`;
      const axialToPixel = (q, r, size) => ({
        x: size * (Math.sqrt(3) * q + (Math.sqrt(3) / 2) * r),
        y: size * (3/2 * r)
      });
      const getHexPoints = (center, size) => {
        const pts = [];
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 180) * (60 * i - 30);
          pts.push(`${center.x + size * Math.cos(angle)},${center.y + size * Math.sin(angle)}`);
        }
        return pts.join(' ');
      };
      const getNeighbors = (q, r) => [
        {q: q+1, r: r}, {q: q+1, r: r-1}, {q: q, r: r-1},
        {q: q-1, r: r}, {q: q-1, r: r+1}, {q: q, r: r+1}
      ];

      // ==========================================
      // ICONS
      // ==========================================
      const Icon = ({ name, ...props }) => {
        const icons = {
          Cpu: <path d="M4 4h16v16H4V4zm4 0V2m8 2V2M4 8H2m2 8H2m18-8h2m-2 8h2m-14 4v2m8-2v2" />,
          Zap: <path d="M13 2 L3 14h9l-1 8 10-12h-9l1-8z" />,
          Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
          Swords: <path d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l2 2 3-3-2-2M15 15l2-2 3 3-2 2M21 3L11.5 12.5M21 3v4M21 3h-4" />,
          TrendingUp: <path d="M23 6l-9.5 9.5-5-5L1 18m22-12h-6m6 0v6" />,
          Plus: <path d="M12 5v14M5 12h14" />,
          X: <path d="M18 6L6 18M6 6l12 12" />
        };
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
            {icons[name]}
          </svg>
        );
      };

      // ==========================================
      // ENGINE
      // ==========================================
      function useGameEngine() {
        const [nodes, setNodes] = useState({});
        const [bits, setBits] = useState(0);
        const [selectedHex, setSelectedHex] = useState(null);
        const [isInitialized, setIsInitialized] = useState(false);
        const [activeExpansions, setActiveExpansions] = useState({});
        const [strikes, setStrikes] = useState([]);
        const [techStats, setTechStats] = useState({ hp: 0, damage: 0, bitGen: 0, expansionSpeed: 0, repairSpeed: 0 });
        const [techMajors, setTechMajors] = useState({ missiles: false, repair: false, ultraStrike: false });

        const nodesRef = useRef(nodes);
        const expansionsRef = useRef(activeExpansions);
        const strikesRef = useRef(strikes);
        const techStatsRef = useRef(techStats);

        useEffect(() => { nodesRef.current = nodes; }, [nodes]);
        useEffect(() => { expansionsRef.current = activeExpansions; }, [activeExpansions]);
        useEffect(() => { strikesRef.current = strikes; }, [strikes]);
        useEffect(() => { techStatsRef.current = techStats; }, [techStats]);

        useEffect(() => {
          if (isInitialized) return;
          const initial = {};
          const coreKey = hexKey(0, 0);
          initial[coreKey] = { q: 0, r: 0, type: NODE_TYPES.CORE, hp: 100, maxHp: 100, controlled: true, expansionProgress: 100 };
          getNeighbors(0, 0).forEach(n => {
            initial[hexKey(n.q, n.r)] = { q: n.q, r: n.r, type: NODE_TYPES.BORDER, hp: 10, maxHp: 10, controlled: true, expansionProgress: 100 };
          });
          const enemyKey = hexKey(5, -2);
          initial[enemyKey] = { q: 5, r: -2, type: NODE_TYPES.ENEMY_CORE, hp: 500, maxHp: 500, controlled: false, expansionProgress: 100 };
          setNodes(initial);
          setIsInitialized(true);
        }, [isInitialized]);

        useEffect(() => {
          const timer = setInterval(() => {
            const nextNodes = { ...nodesRef.current };
            const nextExp = { ...expansionsRef.current };
            const currentStats = techStatsRef.current;
            let modified = false;

            // BITS
            let gain = 0;
            Object.values(nextNodes).forEach(n => { if (n.type === NODE_TYPES.PRODUCTIVE) gain += 0.5 * (1 + currentStats.bitGen * 0.2); });
            if (gain > 0) setBits(b => b + gain);

            // EXPANSION progress
            Object.keys(nextExp).forEach(key => {
              const target = nextNodes[key];
              const prog = Math.min(100, (target.expansionProgress || 0) + 1.5 * (1 + currentStats.expansionSpeed * 0.15));
              nextNodes[key] = { ...target, expansionProgress: prog };
              if (prog >= 100) {
                nextNodes[key] = { ...target, type: NODE_TYPES.BORDER, controlled: true, hp: 10, maxHp: 10 };
                setActiveExpansions(prev => { const n = {...prev}; delete n[key]; return n; });
              }
              modified = true;
            });

            // STRIKES motion
            setStrikes(prev => {
              const nextLines = [];
              prev.forEach(s => {
                if (s.progress + 15 >= 100) {
                  const tKey = hexKey(s.targetQ, s.targetR);
                  if (nextNodes[tKey]) {
                    nextNodes[tKey].hp = Math.max(0, nextNodes[tKey].hp - (10 + currentStats.damage * 2));
                    if (nextNodes[tKey].hp <= 0 && !nextNodes[tKey].type.includes('CORE')) delete nextNodes[tKey];
                    modified = true;
                  }
                } else nextLines.push({...s, progress: s.progress + 15});
              });
              return nextLines;
            });

            if (modified) setNodes(nextNodes);
          }, 500);
          return () => clearInterval(timer);
        }, []);

        return { nodes, bits: Math.floor(bits), selectedHex, setSelectedHex, techStats, techMajors, strikes, activeExpansions,
          startExpansion: (tQ, tR, eQ, eR) => {
            const tKey = hexKey(tQ, tR);
            setActiveExpansions(prev => ({ ...prev, [tKey]: { expanderKeys: [hexKey(eQ, eR)] } }));
            setNodes(prev => ({ ...prev, [tKey]: prev[tKey] || { q: tQ, r: tR, type: NODE_TYPES.EMPTY, hp: 0, maxHp: 0, controlled: false, expansionProgress: 0 } }));
          },
          convertNode: (q, r, type) => {
            const cost = BITS_COST[type];
            if (bits >= cost) {
              setBits(b => b - cost);
              setNodes(prev => ({ ...prev, [hexKey(q,r)]: { ...prev[hexKey(q,r)], type, hp: INITIAL_HP[type], maxHp: INITIAL_HP[type] } }));
            }
          },
          upgradeStat: (id) => {
            const cost = STAT_COST_BASE * (techStats[id] + 1);
            if (bits >= cost) { setBits(b => b - cost); setTechStats(s => ({...s, [id]: s[id] + 1})); }
          },
          fireStrike: (q, r) => {
            setStrikes(prev => [...prev, { id: Math.random(), fromQ: 0, fromR: 0, targetQ: q, targetR: r, progress: 0 }]);
          }
        };
      }

      // ==========================================
      // UI
      // ==========================================
      const HexNode = ({ node, isSelected, isPotentialTarget, onClick }) => {
        const { x, y } = axialToPixel(node.q, node.r, HEX_SIZE);
        const points = getHexPoints({ x, y }, HEX_SIZE);
        const colors = {
          [NODE_TYPES.CORE]: '#7dd3fc', [NODE_TYPES.PRODUCTIVE]: '#10b981', [NODE_TYPES.OFFENSIVE]: '#f43f5e',
          [NODE_TYPES.DEFENSIVE]: '#eab308', [NODE_TYPES.ADVANCE]: '#a855f7', [NODE_TYPES.REPAIR]: '#22d3ee',
          [NODE_TYPES.BORDER]: '#7dd3fc11', [NODE_TYPES.ENEMY_CORE]: '#ff0055', [NODE_TYPES.ENEMY_NODE]: '#991b1b', [NODE_TYPES.EMPTY]: 'transparent'
        };
        const icons = { [NODE_TYPES.CORE]: 'Cpu', [NODE_TYPES.PRODUCTIVE]: 'TrendingUp', [NODE_TYPES.OFFENSIVE]: 'Swords', [NODE_TYPES.DEFENSIVE]: 'Shield', [NODE_TYPES.ADVANCE]: 'Zap', [NODE_TYPES.ENEMY_CORE]: 'Cpu' };
        
        return (
          <g className="cursor-pointer hex-node" onClick={() => onClick(node.q, node.r)}>
            <polygon points={points} fill={colors[node.type]} stroke={isSelected ? '#fff' : (isPotentialTarget ? '#7dd3fc' : '#7dd3fc22')} strokeWidth={isSelected ? 3 : 1} />
            {icons[node.type] && <Icon name={icons[node.type]} x={x-8} y={y-8} width={16} height={16} className="text-white opacity-40 shadow-sm" />}
            {node.expansionProgress > 0 && node.expansionProgress < 100 && (
              <polygon points={getHexPoints({x, y}, HEX_SIZE * (1 - node.expansionProgress/100))} fill="none" stroke="#7dd3fc" strokeWidth="2" />
            )}
            {node.maxHp > 0 && (
              <rect x={x-15} y={y+12} width={30 * (node.hp/node.maxHp)} height={2} fill={colors[node.type]} rx="1" />
            )}
          </g>
        );
      };

      const App = () => {
        const { nodes, bits, selectedHex, setSelectedHex, convertNode, startExpansion, strikes, techStats, upgradeStat, fireStrike } = useGameEngine();
        const [gameStarted, setGameStarted] = useState(false);
        const [isTargeting, setIsTargeting] = useState(false);
        const [isStriking, setIsStriking] = useState(false);
        const [showTech, setShowTech] = useState(false);

        const selNode = selectedHex ? nodes[hexKey(selectedHex.q, selectedHex.r)] : null;

        return (
          <div className="min-h-screen bg-[#090a0f] text-[#e0e6ed] font-inter">
            <header className="fixed top-0 inset-x-0 p-8 flex justify-between items-center z-50 pointer-events-none">
              <div className="bg-[#0a0f1e]/90 backdrop-blur border border-[#7dd3fc]/20 p-5 rounded-2xl pointer-events-auto shadow-2xl">
                <div className="text-[0.6rem] text-[#7dd3fc]/60 tracking-[0.3em] uppercase mb-1">Bits_Account</div>
                <div className="text-3xl font-orbitron text-[#7dd3fc] font-bold tracking-tight">{bits.toLocaleString()}</div>
              </div>
              {gameStarted && <button onClick={() => setShowTech(true)} className="bg-[#7dd3fc]/10 border border-[#7dd3fc]/40 px-8 py-3 rounded-xl font-orbitron text-xs font-bold hover:bg-[#7dd3fc]/20 transition-all pointer-events-auto text-[#7dd3fc]">TECH_CENTER</button>}
            </header>

            <main className="relative flex items-center justify-center min-h-screen">
              {!gameStarted ? (
                <div className="text-center p-16 bg-[#0a0f1e]/60 backdrop-blur-xl border border-[#7dd3fc]/20 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                  <h1 className="text-7xl font-orbitron font-bold mb-4 text-[#7dd3fc] tracking-tighter italic">INCREMENTALISM</h1>
                  <p className="text-[#7dd3fc]/50 mb-12 tracking-widest text-xs uppercase font-light">Standalone Deployment Optimized // Zero-Vite Matrix</p>
                  <button onClick={() => setGameStarted(true)} className="px-16 py-5 bg-[#7dd3fc] text-black font-bold rounded-xl shadow-[0_0_40px_rgba(125,211,252,0.6)] hover:scale-105 active:scale-95 transition-all text-lg tracking-tighter">INITIALIZE_ENGINE</button>
                </div>
              ) : (
                <svg viewBox="-400 -400 800 800" className="w-[85vw] h-[85vw] max-w-[900px] max-h-[900px] drop-shadow-2xl">
                  {Object.values(nodes).map(n => (
                    <HexNode key={hexKey(n.q,n.r)} node={n} isSelected={selectedHex?.q===n.q && selectedHex?.r===n.r} 
                      isPotentialTarget={isTargeting || isStriking} 
                      onClick={(q,r) => {
                        if(isTargeting && selectedHex) { startExpansion(q,r,selectedHex.q,selectedHex.r); setIsTargeting(false); }
                        else if(isStriking && selectedHex) { fireStrike(q,r); setIsStriking(false); }
                        else setSelectedHex({q,r});
                      }} 
                    />
                  ))}
                  {strikes.map(s => {
                    const from = axialToPixel(s.fromQ, s.fromR, HEX_SIZE);
                    const to = axialToPixel(s.targetQ, s.targetR, HEX_SIZE);
                    const cur = { x: from.x + (to.x - from.x) * (s.progress/100), y: from.y + (to.y-from.y)*(s.progress/100) };
                    return <circle key={s.id} cx={cur.x} cy={cur.y} r="6" fill="#f43f5e" className="animate-pulse shadow-glow" />
                  })}
                </svg>
              )}
            </main>

            {selNode && (
              <aside className="fixed right-8 top-1/4 w-80 bg-[#0a0f1e]/90 backdrop-blur-xl border border-[#7dd3fc]/20 rounded-3xl p-8 shadow-2xl animate-in slide-in-from-right-10 duration-500">
                <div className="text-[0.6rem] text-[#7dd3fc]/40 tracking-widest uppercase mb-2">Node_Information</div>
                <h2 className="text-3xl font-orbitron font-bold text-[#7dd3fc] mb-8 tracking-tighter">{selNode.type}</h2>
                <div className="grid gap-4">
                  {selNode.type === NODE_TYPES.BORDER && Object.keys(BITS_COST).map(type => (
                    <button key={type} onClick={() => convertNode(selectedHex.q, selectedHex.r, type)} className="text-left p-4 bg-[#7dd3fc]/5 border border-[#7dd3fc]/15 rounded-xl hover:bg-[#7dd3fc]/15 transition-all text-[0.7rem] font-bold group">
                      <div className="flex justify-between items-center capitalize">
                        <span>{type.toLowerCase()}</span>
                        <span className="text-[#7dd3fc]">{BITS_COST[type]} B</span>
                      </div>
                    </button>
                  ))}
                  {selNode.controlled && <button onClick={() => setIsTargeting(!isTargeting)} className="p-5 bg-[#7dd3fc] text-black rounded-xl font-bold text-xs uppercase shadow-lg hover:bg-white transition-all tracking-widest">{isTargeting ? 'CANCEL_EXP' : 'EXPAND'}</button>}
                  {selNode.type === NODE_TYPES.OFFENSIVE && <button onClick={() => setIsStriking(!isStriking)} className="p-5 bg-[#f43f5e] text-white rounded-xl font-bold text-xs uppercase shadow-lg hover:bg-white hover:text-[#f43f5e] transition-all tracking-widest">{isStriking ? 'CANCEL_STRIKE' : 'STRIKE'}</button>}
                </div>
              </aside>
            )}

            {showTech && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-6 backdrop-blur-2xl">
                <div className="bg-[#0a0f1e] border border-[#7dd3fc]/30 rounded-[40px] w-full max-w-2xl p-12 shadow-2xl">
                  <div className="flex justify-between items-center mb-12">
                    <h2 className="text-4xl font-orbitron font-bold text-[#7dd3fc] tracking-tighter">RESEARCH_ARRAY</h2>
                    <button onClick={() => setShowTech(false)} className="p-2 hover:bg-white/10 rounded-full transition-all text-white"><Icon name="X" className="w-8 h-8" /></button>
                  </div>
                  <div className="grid gap-5">
                    {Object.keys(techStats).map(id => (
                      <div key={id} className="p-8 bg-[#7dd3fc]/5 border border-[#7dd3fc]/10 rounded-3xl flex justify-between items-center group hover:border-[#7dd3fc]/30 transition-all">
                        <div>
                          <h4 className="font-bold text-[#7dd3fc] uppercase text-sm mb-1 tracking-widest">{id.replace(/([A-Z])/g, '_$1')}</h4>
                          <p className="text-[0.65rem] text-white/40 uppercase">Optimizing system throughput</p>
                        </div>
                        <div className="flex items-center gap-6">
                           <span className="text-xs font-orbitron text-white/40">LV {techStats[id]}</span>
                           <button onClick={() => upgradeStat(id)} className="bg-[#7dd3fc] text-black px-8 py-3 rounded-xl font-orbitron text-[0.7rem] font-bold shadow-lg hover:bg-white transition-all transform hover:scale-105 active:scale-95">
                             {STAT_COST_BASE * (techStats[id]+1)} B
                           </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
